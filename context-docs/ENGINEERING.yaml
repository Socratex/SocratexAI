items:
  quick_index:
    title: Quick Index
    content: |
      - Summary
      - Tagged Rules
      - Purpose
  summary:
    title: Summary
    content: |
      This file is the compact engineering standards capsule compiled into `AI-compiled/project/knowledge.sqlite`.

      Source documents remain authoritative. SQLite is a generated query/index layer for faster agent context loading.
  tagged_rules:
    title: Tagged Rules
    value:
      - id: engineering.workflow.knowledge_sqlite_generated_layer
        type: rule
        subtype: workflow_rule
        title: SQLite Knowledge Is Generated
        summary: The SQLite knowledge database is a compiled index, not a manually edited source of truth.
        rule: Edit source documents first, then refresh `AI-compiled/project/knowledge.sqlite` with `tools/knowledge_compile.ps1` for a full rebuild or `tools/knowledge_upsert.ps1 -Path <document>` for a targeted document update.
        rationale: This preserves readable source documents while giving agents fast tag, type, source, and startup-context queries.
        priority: must
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - workflow
          - docs-workflow
          - verification
        source_refs:
          - path: context-docs/ENGINEERING.yaml
            selector: tagged_rules
            note: Source pipeline starter rule.
      - id: engineering.workflow.knowledge_views
        type: rule
        subtype: workflow_rule
        title: Query Context Through Named Views
        summary: Use named knowledge views for common context lanes before broader document reads.
        rule: Prefer `tools/knowledge_select.ps1 -View <view_id>` for prepared context lanes such as `session_start`, `debugging`, `performance`, and `docs_workflow`; use tag/type/source queries when the task needs a narrower slice.
        rationale: Named views reduce context cost and make repeated agent startup/query behavior consistent across projects.
        priority: should
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - workflow
          - docs-workflow
        source_refs:
          - path: context-docs/ENGINEERING.yaml
            selector: tagged_rules
            note: Source pipeline starter rule.
      - id: engineering.workflow.context_tags_before_response
        type: rule
        subtype: workflow_rule
        title: Context Tags Before Response
        summary: Commands and substantive questions should route through main workflow context, prompt-derived tags, and compiled notes before answer or execution.
        rule: For every user command or substantive question, load the main workflow/instruction context first, derive context tags from the user text with `tools/context_tags.ps1` when available, then query compiled notes with `tools/knowledge_select.ps1 -Tags <tags> -Match any` before answering or executing. Use tag-selected notes as routing and risk context; read exact source documents before edits, high-stakes claims, or ambiguity resolution.
        rationale: Prompt-derived tags make compiled knowledge useful beyond broad startup slices and reduce missed workflow, architecture, diagnostic, or documentation constraints.
        priority: must
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - workflow
          - docs-workflow
          - compiled-context
          - knowledge
        source_refs:
          - path: core/AGENT-CONTRACT.yaml
            selector: operating_principles
            note: Shared contract requires tag-derived context before substantive answers and commands.
          - path: project/code/WORKFLOW.yaml
            selector: read_order
            is_duplicate: true
            note: Code workflow defines the executable context-tag pass.
          - path: tools/context_tags.ps1
            selector: script
            is_duplicate: true
            note: Source pipeline helper for deriving context tags from user text.
      - id: engineering.workflow.knowledge_hash_gate
        type: rule
        subtype: verification_rule
        title: Validate Source Hashes Before Trusting SQLite
        summary: A compiled knowledge database is trustworthy only when its tracked source hashes match current documents.
        rule: Run `tools/knowledge_check.ps1` before relying on existing compiled knowledge; if stale documents are reported, refresh them with `tools/knowledge_upsert.ps1 -Path <document>` or rebuild with `tools/knowledge_compile.ps1`.
        rationale: Hash checks prevent agents from reading stale compiled knowledge after source documents change.
        priority: must
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - verification
          - docs-workflow
        source_refs:
          - path: context-docs/ENGINEERING.yaml
            selector: tagged_rules
            note: Source pipeline starter rule.
      - id: engineering.workflow.knowledge_file_fallback
        type: rule
        subtype: workflow_rule
        title: Use File Knowledge Fallback When SQLite Is Unavailable
        summary: The JSON table fallback mirrors the core SQLite table model but intentionally omits named views.
        rule: If SQLite cannot be used, read compiled knowledge from `AI-compiled/project/knowledge-files/` with `tools/knowledge_file_select.ps1`; query by tags, type, source path, document path, entry name, or startup flag instead of named views.
        rationale: Some hosts may not allow SQLite writes or may lock the database file, but agents still need a compact compiled knowledge layer.
        priority: should
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - workflow
          - docs-workflow
          - verification
        source_refs:
          - path: context-docs/ENGINEERING.yaml
            selector: tagged_rules
            note: Source pipeline file-fallback rule.
      - id: engineering.workflow.load_standards_before_code
        type: rule
        subtype: workflow_rule
        title: Load Engineering Standards Before Code Work
        summary: Programming work should load compiled engineering, coding, and architecture guidance before source edits.
        rule: For implementation, refactor, bugfix, or code review tasks, prefer `tools/knowledge_code_context.ps1` before editing code. If the wrapper is unavailable, load the broad rules slice with `tools/knowledge_select.ps1 -Tags engineering,coding,architecture -Match any -Type rule`, then load task-specific views or tags as needed.
        rationale: Professional code quality depends on keeping ownership, architecture, readability, diagnostics, verification, and project best practices active in context during implementation.
        priority: must
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - workflow
          - coding
          - architecture
          - docs-workflow
        source_refs:
          - path: project/code/WORKFLOW.yaml
            selector: read_order
            note: Code workflow read-order requirement for programming tasks.
          - path: project/code/WORKFLOW.yaml
            selector: script_first_execution
            is_duplicate: true
            note: Script-first workflow repeats the preferred query command.
          - path: tools/knowledge_code_context.ps1
            selector: script
            note: Canonical helper for loading the code-task engineering context slice.
      - id: engineering.coding.explicit_diagnosable_flow
        type: rule
        subtype: coding_rule
        title: Explicit Diagnosable Flow
        summary: Prefer explicit data flow, ownership, boundaries, and verification over hidden or clever behavior.
        rule: |
          Keep implementation easy to trace mechanically: clear entry points, explicit state changes, source-of-truth ownership, boundary normalization, and verification attached to risky behavior.
        rationale: SocratexPipeline is meant to preserve long-running agent continuity; implicit systems make that continuity fragile.
        priority: should
        source_of_truth: context-docs/ENGINEERING.yaml
        load_at_start: true
        stability: durable
        tags:
          - engineering
          - coding
          - architecture
          - diagnostics
        source_refs:
          - path: core/AGENT-CONTRACT.yaml
            selector: operating_principles
            note: Consolidated from the shared agent contract.
          - path: project/code/WORKFLOW.yaml
            selector: general_workflow
            is_duplicate: true
            note: Code-project workflow repeats the same future-fit and diagnostic bias.
  purpose:
    title: Purpose
    content: |
      Use this file as the starter tagged knowledge source for SocratexPipeline engineering, workflow, and coding rules.
