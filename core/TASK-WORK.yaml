  overview:
    title: 'Overview'
    format: 'markdown-section'
    body: |
      # Task Work
      
  purpose:
    title: 'Purpose'
    format: 'markdown-section'
    body: |
      ## Purpose
      
      Use this protocol for broad tasks that are too large to safely track only in live chat.
      
      The agent should create a temporary YAML micro-task file, execute it step by step, update statuses during work, then clean it up or promote only durable facts.
      
  when_to_use:
    title: 'When To Use'
    format: 'markdown-section'
    body: |
      ## When To Use
      
      Use task work tracking when a request:
      
      - touches multiple files, modules, systems, or documents,
      - has several phases,
      - includes many requirements that are easy to forget,
      - requires document migration,
      - may be interrupted,
      - is expected to take longer than one small focused prompt,
      - has unclear risks, open questions, or verification steps.
      
      Do not use it for small, local, reversible edits where the tracking overhead is larger than the task.
      
  default_file:
    title: 'Default File'
    format: 'markdown-section'
    body: |
      ## Default File
      
      For code projects, use:
      
      ```text
      docs-tech/cache/current_task.yaml
      ```
      
      If the project uses another cache directory, use the configured equivalent.
      
      This file is temporary working memory, not project history.
      
      It should normally be untracked. Commit it only when the project explicitly treats task work files as reviewable artifacts.
      
  minimal_schema:
    title: 'Minimal Schema'
    format: 'markdown-section'
    body: |
      ## Minimal Schema
      
      ```yaml
      task:
        title: TBD
        status: active
        source_request: TBD
        done_criteria: []
      micro_tasks:
        - key: inspect_context
          status: pending
          result: TBD
        - key: implement_change
          status: pending
          result: TBD
        - key: verify
          status: pending
          result: TBD
      questions: []
      risks: []
      next_suggestions: []
      ```
      
      Statuses:
      
      - `pending`
      - `active`
      - `done`
      - `blocked`
      - `skipped`
      
  workflow:
    title: 'Workflow'
    format: 'markdown-section'
    body: |
      ## Workflow
      
      1. Create or refresh the temporary task file before broad implementation.
      2. Split the request into small, ordered micro-tasks.
      3. Mark one micro-task `active` at a time.
      4. Update each micro-task with a short result when completed.
      5. Add risks, questions, and verification gaps as they are discovered.
      6. Before final response, verify every required micro-task is `done`, `skipped`, or intentionally deferred.
      7. Remove the temporary file when it has no future value.
      8. Promote only durable facts to the right memory layer.
      
  promotion:
    title: 'Promotion'
    format: 'markdown-section'
    body: |
      ## Promotion
      
      At the end of the task:
      
      - promote durable technical facts to `context-docs/`,
      - promote durable decisions to `DECISIONS.yaml` in code projects or `DECISIONS.md` in non-code user-facing memory,
      - promote remaining future work to `_PLAN.yaml` or `TODO.yaml` in code projects, or `_PLAN.md` / `BACKLOG.md` in non-code user-facing memory,
      - promote shipped behavior or major fixes to `CHANGELOG.yaml` in code projects when `changelog.enabled` is not `no`, or to a user-facing Markdown changelog when a non-code project uses one,
      - keep only the compact current checkpoint in `STATE.yaml` for code projects or `STATE.md` for non-code user-facing memory.
      
      Do not copy the full temporary micro-task file into project memory.
      
  structured_document_edits:
    title: 'Structured Document Edits'
    format: 'markdown-section'
    body: |
      ## Structured Document Edits
      
      For YAML documents with `index` and `items`, use document item scripts for structural moves:
      
      - `tools/doc_item_migrate.ps1` to move or copy an item between documents,
      - `tools/doc_item_move.ps1` to move an item inside one document,
      - `tools/doc_item_insert.ps1` to add an item at a controlled position,
      - `tools/doc_read.ps1` and `tools/doc_keys.ps1` for selective reads before editing.
      
      Manual edits are acceptable when:
      
      - changing the document schema itself,
      - fixing the parser or migration tool,
      - the script is unavailable or broken,
      - doing a very small text correction inside one item and no field-level script exists.
      
      If a script cannot run because a runtime is missing, follow `core/SCRIPT-FALLBACK.yaml`.
      
      

