  overview:
    title: 'Overview'
    format: 'markdown-section'
    body: |
      # Update Protocol

  purpose:
    title: 'Purpose'
    format: 'markdown-section'
    body: |
      ## Purpose

      Use this protocol when the user asks to update, refresh, reinstall, or pull the latest SocratexAI pipeline in an already configured project.

      The agent must know where the pipeline comes from and which updater to run before changing files.

  source_resolution:
    title: 'Source Resolution'
    format: 'markdown-section'
    body: |
      ## Source Resolution

      Determine the update source in this order:

      1. `PIPELINE-CONFIG.yaml` value `pipeline.update_source`.
      2. `PIPELINE-CONFIG.yaml` value `pipeline.public_bootstrap_url`.
      3. The installed `SocratexAI/PUBLIC-BOOTSTRAP.md` source URL if documented by the project.
      4. A user-provided URL or local source path.
      5. Ask the user for the update source.

      Do not guess a repository URL when no source is configured.

  update_command:
    title: 'Update Command'
    format: 'markdown-section'
    body: |
      ## Update Command

      For public user updates, prefer:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File SocratexAI/tools/update_pipeline_from_link.ps1 -Source "<zip-or-local-source>" -Packs code -ReinitializeNew
      ```

      Use the selected project packs from config when available.

      If `pipeline.update_command` exists in config, use it as the command template after replacing `<source>` with the resolved update source.

      If the updated pipeline contains new initialized artifacts, run:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File SocratexAI/tools/reinitialize_pipeline.ps1 -TargetPath .
      ```

      Reinitialization must be missing-only: create newly introduced files or config defaults, but do not overwrite active project memory.

      When updating the pipeline inside Riftbound Vanguard, ask whether the user also wants the source `SocratexPipeline` repository upgraded and pushed when the installed pipeline change exposes a reusable pipeline improvement.

      For maintainer-only upgrades from a private reference project, use the maintainer upgrade tool only when the user explicitly requests that source:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File SocratexAI/tools/upgrade_from_riftbound.ps1 -RiftboundPath "<path>"
      ```

      For migration from another AI pipeline, use:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File SocratexAI/tools/migrate_ai_pipeline.ps1
      ```

  feature_learning:
    title: 'Feature Learning'
    format: 'markdown-section'
    body: |
      ## Feature Learning

      `pipeline_featurelist.json` is the compact feature-id contract for comparing source and installed pipelines.

      The source `SocratexPipeline/pipeline_featurelist.json` is canonical and must not reference specific installed projects.

      Installed projects may keep an instance manifest at project root with:

      - `features`
      - `comparison_to_source.same`
      - `comparison_to_source.missing_from_instance`
      - `comparison_to_source.extra_in_instance`

      When a project develops a reusable non-project-specific pipeline behavior, inspect it with:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File tools/learn_pipeline_features.ps1 -ProjectPath "<project>"
      ```

      For structured local intake that an agent can read later, generate a JSON learning report with:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File tools/report_pipeline_learning.ps1 -ProjectPath "<project>" -OutputPath "learning/inbox/<project>.json"
      ```

      For public pipeline improvement intake, use only a prefilled GitHub Issue URL:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File tools/open_pipeline_learning_issue.ps1 -ProjectPath "<project>" -Open
      ```

      This is the only supported public network intake path for now. It does not require a GitHub token in the pipeline and does not write through an API; the user reviews the prefilled issue and submits it from the browser.

      When the report comes from a concrete AI improvement, include a short explanation and changed scripts:

      ```powershell
      powershell -NoProfile -ExecutionPolicy Bypass -File tools/open_pipeline_learning_issue.ps1 -ProjectPath "<project>" -LearnedSummary "<what AI learned>" -ChangedScripts @("tools/example.ps1") -Open
      ```

      Apply selected reusable features to the source manifest with `-Apply -IncludeFeatures <ids>` or `-Apply -AcceptAll` only after excluding project/domain-specific features.

      After the source learns new canonical feature IDs, future project updates and reinitialization should run `tools/sync_pipeline_featurelist.ps1` so installed projects can compare themselves against the new source feature list.

  workflow:
    title: 'Workflow'
    format: 'markdown-section'
    body: |
      ## Workflow

      1. Read root `SOCRATEX.md`.
      2. Read installed pipeline config.
      3. Resolve the update source.
      4. Check runtime availability or follow `core/SCRIPT-FALLBACK.yaml`.
      5. Run the updater with explicit source and packs.
      6. Reinitialize missing-only if new initializer artifacts exist or the updater was invoked with `-ReinitializeNew`.
      7. Run `SocratexAI/tools/audit_docs.ps1` when available.
      8. Run `SocratexAI/core/ACTIVATION-CHECK.yaml` after update.
      9. Report updated source, packs, reinitialized artifacts, verification, skipped checks, and remaining risks.

  safety:
    title: 'Safety'
    format: 'markdown-section'
    body: |
      ## Safety

      Do not overwrite project memory such as active state, branch state, plans, backlog, decisions, or context docs unless the updater explicitly preserves or migrates them.

      Do not update from an untrusted URL without telling the user what source will be used.

      If update source is missing, ask for it and stop before changing files.
