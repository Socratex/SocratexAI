      # File Formats

  summary:
    title: 'Summary'
    format: 'markdown-section'
    body: |
      ## Summary

      This file defines format choices across SocratexPipeline project types.

  code_projects:
    title: 'Code Projects'
    format: 'markdown-section'
    body: |
      ## Code Projects

      Code projects should use YAML and JSON for standardized project memory, registries, configuration, indexes, diagnostics, and AI-readable structured documents.

      Use Markdown in code projects only for scratch-style files:

      - raw user instruction intake,
      - temporary notes,
      - rough drafts,
      - human scratchpads,
      - short README-style user-facing docs when no structured state is stored.

      Preferred code-project formats:

      - `STATE.yaml`
      - `_PLAN.yaml`
      - `TODO.yaml`
      - `BUGS.yaml`
      - `BUGS-SOLVED.yaml`
      - `CHANGELOG.yaml` when `changelog.enabled` is not `no`
      - `DECISIONS.yaml`
      - `PIPELINE-CONFIG.yaml`
      - `context-docs/*.yaml`
      - generated indexes or caches as `.json`
      - diagnostics summaries as `.json` when machine-read, `.yaml` when agent-read

  non_code_projects:
    title: 'Non-Code Projects'
    format: 'markdown-section'
    body: |
      ## Non-Code Projects

      Non-code projects should also use YAML for standardized project memory, configuration, plans, backlog, issues, decisions, reviews, and agent-readable context.

      Use Markdown in non-code projects only for raw scratch intake, prompt drafts, human-facing prose artifacts, and adapter/public entrypoints.

      Preferred non-code project formats:

      - `STATE.yaml`
      - `_PLAN.yaml`
      - `BACKLOG.yaml`
      - `DECISIONS.yaml`
      - `ISSUES.yaml`
      - `JOURNAL.yaml`
      - `REVIEW.yaml`
      - `PIPELINE-CONFIG.yaml`
      - `context-docs/*.yaml`

      Do not force final human-facing deliverables into YAML when Markdown or another native output format is the actual artifact.

  migration_rule:
    title: 'Migration Rule'
    format: 'markdown-section'
    body: |
      ## Migration Rule

      When converting a code project from Markdown to YAML/JSON:

      1. Preserve all unresolved requirements.
      2. Convert standardized registries first.
      3. Keep raw scratch files as Markdown.
      4. Update the audit rules and initializer together.


