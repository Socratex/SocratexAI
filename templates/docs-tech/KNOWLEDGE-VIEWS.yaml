index:
  - quick_index
  - purpose
  - view_contract
  - defined_views
items:
  quick_index:
    title: Quick Index
    content: |
      - Purpose
      - View Contract
      - Defined Views
  purpose:
    title: Purpose
    content: |
      This file defines named SQLite knowledge views used by `tools/knowledge_select.ps1 -View <id>`.

      Views are source configuration, not cache. The compiled database materializes `views` and `view_entries` during `tools/knowledge_compile.ps1`, `tools/knowledge_upsert.ps1`, `tools/knowledge_delete.ps1`, and `tools/knowledge_rename.ps1`.
  view_contract:
    title: View Contract
    content: |
      Each view selects knowledge entries by tags, type, and optional startup flag.

      Supported fields:
      - `id`: stable query id.
      - `title`: human-readable label.
      - `description`: short explanation of when the view should be used.
      - `tags`: many-to-many entry tags used as the primary filter.
      - `match`: `all` requires every tag, `any` accepts any listed tag.
      - `type`: optional entry type filter such as `rule`, `fact`, `decision`, `risk`, or `workflow`.
      - `load_at_start`: optional filter that keeps only entries marked for session startup.
  defined_views:
    title: Defined Views
    content: |
      Starter views cover the default context lanes requested for the project knowledge index:
      `session_start`, `architecture_godot`, `debugging`, `performance`, `docs_workflow`, and `worldgen`.
views:
  - id: session_start
    title: Session Start
    description: Core knowledge that should be loaded at the beginning of session context building.
    tags:
      - engineering
      - workflow
      - docs-workflow
    match: any
    load_at_start: true
  - id: architecture_godot
    title: Godot Architecture
    description: Godot ownership, scene-glue, runtime, and architecture rules when a project records Godot-specific entries.
    tags:
      - architecture
      - godot
    match: all
  - id: debugging
    title: Debugging
    description: Diagnostics, logging, verification, and failure-investigation guidance.
    tags:
      - diagnostics
      - verification
      - debugging
    match: any
  - id: performance
    title: Performance
    description: Runtime cost, performance budgets, and performance-sensitive verification guidance.
    tags:
      - performance
    match: any
  - id: docs_workflow
    title: Docs Workflow
    description: Documentation workflow, source-of-truth, finalizer, and compiled-knowledge rules.
    tags:
      - docs-workflow
      - workflow
      - verification
    match: any
  - id: worldgen
    title: Worldgen
    description: Generated-world, route graph, biome, persistence, and durable world-state guidance when a project records worldgen entries.
    tags:
      - worldgen
      - persistence
      - data-first
    match: any
meta:
  document:
    title: Knowledge Views
    type: compiled_knowledge_config
    language: en
