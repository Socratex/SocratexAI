schema: socratex-document/v1
title: 'Bugs'
index:
  - quick_index
  - overview
  - summary
  - bug_template
items:
  quick_index:
    title: 'Quick Index'
    refs:
      - overview
      - summary
      - bug_template
  overview:
    title: 'Overview'
    format: 'markdown-section'
    body: |
      # Bugs
      
  summary:
    title: 'Summary'
    format: 'markdown-section'
    body: |
      ## Summary
      
      Active confirmed or likely defects.
      
  bug_template:
    title: 'Bug Template'
    format: 'markdown-section'
    body: |
      ## Bug Template
      
      ### Bug N: Short title
      
      Status: Active
      
      Observed behavior: TBD.
      
      Expected behavior: TBD.
      
      Reproduction: TBD.
      
      Evidence: TBD.
      
      Current hypothesis: TBD.
      
      Attempted fixes: None yet.
      
      Verification: Not verified.
      
      Next action: TBD.
      
